<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3A SOMOS TODOS - App Vecinal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--azul:#0056b3;--verde:#0d8a4f;--naranja:#ff9800;--rojo:#d32f2f;--oro:#FFD700}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
  body{background:#f0f4f8;color:#222}
  .header{background:linear-gradient(135deg,var(--azul),var(--rojo));color:white;padding:20px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.2)}
  .header h1{font-size:1.8em;font-weight:800}
  .header p{font-size:.9em;opacity:.9}
  .puntos-bar{background:var(--oro);color:#000;padding:15px;text-align:center;font-weight:800;font-size:1.2em;position:sticky;top:85px;z-index:9}
  .container{max-width:800px;margin:0 auto;padding:15px}
  .card{background:white;margin-bottom:15px;border-radius:16px;padding:20px;box-shadow:0 3px 12px rgba(0,0,0,.08)}
  .btn{background:var(--verde);color:white;border:none;padding:14px 20px;border-radius:12px;font-weight:700;cursor:pointer;width:100%;font-size:1em;transition:.2s}
  .btn:hover{transform:scale(.98)}
  .btn:disabled{background:#ccc;cursor:not-allowed}
  .input-form{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc;font-family:'Poppins';font-size:1em}
  .input-form:focus{border-color:var(--azul);outline:none}
  .tabs{display:flex;gap:10px;margin-bottom:15px}
  .tab-btn{flex:1;padding:14px;background:white;border:none;border-radius:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .tab-btn.active{background:var(--azul);color:white}
  .hidden{display:none}
  .mision-card{border-left:5px solid var(--naranja)}
  .mision-enviada{border-left:5px solid var(--verde);opacity:.7}
  .beneficio-item{background:#f8f9fa;padding:15px;border-radius:12px;margin-bottom:10px;border:2px solid #eee}
  .beneficio-item h4{color:var(--azul);margin-bottom:5px}
  .beneficio-item small{color:#666}
  label{font-weight:600;font-size:.9em;margin-top:8px;display:block}
</style>
</head>
<body>
<div class="header">
  <h1>3A SOMOS TODOS</h1>
  <p>Municipalidad de Tres Arroyos</p>
</div>
<div class="puntos-bar">Tus Puntos: <span id="misPuntos">0</span> pts</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="mostrarTab('reportar', this)">📸 Reportar Misión</button>
    <button class="tab-btn" onclick="mostrarTab('canjear', this)">🎁 Canjear Puntos</button>
  </div>

  <!-- TAB REPORTAR -->
  <div id="tab-reportar">
    <div class="card">
      <h3 style="color:var(--azul);margin-bottom:15px">Reportar Nueva Misión</h3>
      <label>Que hiciste?</label>
      <input type="text" id="mision" class="input-form" placeholder="Ej: Limpiar plaza, pintar cordon">
      
      <label>Dirección</label>
      <input type="text" id="direccion" class="input-form" placeholder="Ej: Av. Belgrano 123">
      
      <label>Barrio</label>
      <input type="text" id="barrio" class="input-form" placeholder="Ej: Centro">
      
      <label>Puntos que solicitas</label>
      <input type="number" id="puntos" class="input-form" placeholder="Ej: 100">
      
      <label>Descripción y Evidencia</label>
      <textarea id="descripcion" class="input-form" rows="3" placeholder="Contanos que hiciste..."></textarea>
      
      <button class="btn" onclick="enviarMision()">Enviar a Validar</button>
    </div>
    <div id="misMisiones"></div>
  </div>

  <!-- TAB CANJEAR -->
  <div id="tab-canjear" class="hidden">
    <div class="card">
      <h3 style="color:var(--azul);margin-bottom:15px">Formulario de Canje</h3>
      <p style="font-size:.9em;color:#666;margin-bottom:15px">Completa todos tus datos. Te vamos a avisar por WhatsApp cuando este listo para retirar.</p>
      
      <label>Nombre y Apellido</label>
      <input type="text" id="nombreCanje" class="input-form" placeholder="Juan Perez">
      
      <label>DNI</label>
      <input type="text" id="dniCanje" class="input-form" placeholder="12345678">
      
      <label>Teléfono con WhatsApp</label>
      <input type="text" id="telCanje" class="input-form" placeholder="2983-123456">
      
      <label>Barrio</label>
      <input type="text" id="barrioCanje" class="input-form" placeholder="Centro">
      
      <label>Dirección de entrega</label>
      <input type="text" id="direccionCanje" class="input-form" placeholder="Opcional">
      
      <label>Elegi tu Beneficio</label>
      <select id="beneficioCanje" class="input-form" onchange="actualizarCosto()">
        <option value="">Selecciona un beneficio</option>
        <option value="Bolsa de Residuos" data-costo="500">Bolsa de Residuos - 500 pts</option>
        <option value="Kit de Reciclado" data-costo="1000">Kit de Reciclado - 1000 pts</option>
        <option value="Entrada al Cine" data-costo="800">Entrada al Cine - 800 pts</option>
        <option value="Descuento Comercio" data-costo="1200">Descuento Comercio - 1200 pts</option>
      </select>
      
      <div id="costoInfo" style="background:#e8f5e9;padding:10px;border-radius:8px;margin:10px 0;text-align:center;font-weight:700;color:var(--verde)" class="hidden"></div>
      
      <button class="btn" onclick="solicitarCanje()">Solicitar Canje</button>
    </div>
    
    <div id="misCanjes"></div>
  </div>
</div>

<script>
let usuario = JSON.parse(localStorage.getItem('usuario3A')) || {id:1,nombre:"Vecino",puntos:2500,barrio:"Centro",nivel:"Bronce"};
localStorage.setItem('usuario3A', JSON.stringify(usuario));

function mostrarTab(tab, btn){
  document.querySelectorAll('[id^="tab-"]').forEach(t=>t.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.remove('hidden');
  btn.classList.add('active');
  if(tab=='reportar') cargarMisMisiones();
  if(tab=='canjear') cargarMisCanjes();
}

function actualizarCosto(){
  let select = document.getElementById('beneficioCanje');
  let costo = select.options[select.selectedIndex].getAttribute('data-costo');
  let info = document.getElementById('costoInfo');
  if(costo){
    info.innerHTML = `Este beneficio cuesta: ${costo} puntos`;
    info.classList.remove('hidden');
  }else{
    info.classList.add('hidden');
  }
}

function enviarMision(){
  let mision = document.getElementById('mision').value;
  if(!mision || !document.getElementById('direccion').value) return alert("Completa todos los campos");
  
  let reportes = JSON.parse(localStorage.getItem('reportes3A')) || [];
  let nueva = {
    id: Date.now(),
    mision: mision,
    direccion: document.getElementById('direccion').value,
    barrio: document.getElementById('barrio').value,
    descripcion: document.getElementById('descripcion').value,
    puntos: parseInt(document.getElementById('puntos').value) || 0,
    usuario: usuario.nombre,
    usuarioId: usuario.id,
    fecha: new Date().toISOString(),
    estado: "Pendiente"
  };
  reportes.push(nueva);
  localStorage.setItem('reportes3A', JSON.stringify(reportes));
  localStorage.setItem('ultimaAccion', Date.now());
  
  alert("✅ Misión enviada a validar");
  document.querySelectorAll('#tab-reportar .input-form').forEach(i=>i.value="");
  cargarMisMisiones();
}

function cargarMisMisiones(){
  let reportes = JSON.parse(localStorage.getItem('reportes3A')) || [];
  let historial = JSON.parse(localStorage.getItem('historialMisiones3A')) || [];
  let todos = [...reportes, ...historial].filter(r=>r.usuarioId==usuario.id);
  let html = "<h3 style='margin:20px 0;color:var(--azul)'>Mis Misiones</h3>";
  if(todos.length==0) html += "<div class='card'>Aun no enviaste misiones</div>";
  todos.forEach(r=>{
    let clase = r.estado=="Pendiente" ? "mision-card" : "mision-enviada";
    let estadoTxt = r.estado||'Pendiente';
    html += `<div class="card ${clase}">
      <b>${r.mision}</b> - ${r.puntos} pts<br>
      <small><b>Estado:</b> ${estadoTxt} - <b>Fecha:</b> ${new Date(r.fecha).toLocaleDateString('es-AR')}</small><br>
      <small>${r.direccion} - ${r.barrio}</small>
    </div>`
  });
  document.getElementById('misMisiones').innerHTML = html;
  document.getElementById('misPuntos').innerText = usuario.puntos.toLocaleString();
}

function solicitarCanje(){
  let costo = parseInt(document.getElementById('beneficioCanje').options[document.getElementById('beneficioCanje').selectedIndex]?.getAttribute('data-costo') || 0);
  
  if(!document.getElementById('nombreCanje').value || !document.getElementById('dniCanje').value || !document.getElementById('telCanje').value) 
    return alert("Completa Nombre, DNI y Telefono");
  if(!costo) return alert("Selecciona un beneficio");
  if(usuario.puntos < costo) return alert("No tenes suficientes puntos");
  
  let canjes = JSON.parse(localStorage.getItem('canjes3A')) || [];
  let nuevo = {
    id: Date.now(),
    nombre: document.getElementById('nombreCanje').value,
    dni: document.getElementById('dniCanje').value,
    telefono: document.getElementById('telCanje').value,
    barrio: document.getElementById('barrioCanje').value,
    direccion: document.getElementById('direccionCanje').value,
    beneficio: document.getElementById('beneficioCanje').value,
    costo: costo,
    fecha: new Date().toISOString(),
    estado: "Pendiente"
  };
  canjes.push(nuevo);
  usuario.puntos -= costo;
  localStorage.setItem('canjes3A', JSON.stringify(canjes));
  localStorage.setItem('usuario3A', JSON.stringify(usuario));
  localStorage.setItem('ultimaAccion', Date.now());
  
  alert("✅ Canje solicitado. Te avisamos por WhatsApp cuando este listo");
  document.querySelectorAll('#tab-canjear .input-form').forEach(i=>i.value="");
  document.getElementById('costoInfo').classList.add('hidden');
  cargarMisCanjes();
  cargarMisMisiones();
}

function cargarMisCanjes(){
  let canjes = JSON.parse(localStorage.getItem('canjes3A')) || [];
  let misCanjes = canjes.filter(c=>c.dni == document.getElementById('dniCanje').value || c.nombre.includes(usuario.nombre));
  let html = "<h3 style='margin:20px 0;color:var(--azul)'>Mis Solicitudes de Canje</h3>";
  if(misCanjes.length==0) html += "<div class='card'>No tenes canjes solicitados</div>";
  misCanjes.forEach(c=>{
    html += `<div class="card">
      <b>${c.beneficio}</b> - ${c.costo} pts<br>
      <small><b>Estado:</b> ${c.estado} - <b>Fecha:</b> ${new Date(c.fecha).toLocaleDateString('es-AR')}</small>
    </div>`
  });
  document.getElementById('misCanjes').innerHTML = html;
}

cargarMisMisiones();
</script>
</body>
</html>
