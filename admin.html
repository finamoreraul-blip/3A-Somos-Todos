<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin 3A SOMOS TODOS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--azul:#0056b3;--verde:#0d8a4f;--naranja:#ff9800;--rojo:#d32f2f;--oro:#FFD700;--violeta:#8e44ad}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
  body{background:#f0f4f8;color:#222;padding-bottom:20px}
.hidden{display:none}
.header{background:linear-gradient(135deg,var(--azul),var(--verde));color:white;padding:18px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.header h1{font-size:1.4em;font-weight:800;letter-spacing:.5px}
.header p{font-size:.8em;opacity:.9}

.eslogan-box{
    background:linear-gradient(135deg,var(--azul),var(--verde));
    color:white;
    text-align:center;
    padding:25px 15px 20px 15px;
  }
.eslogan-box h2{font-size:1.9em;font-weight:800;margin-bottom:8px}
.eslogan-box p{font-size:1em;opacity:.95}

.card{background:white;margin:15px;border-radius:18px;padding:20px;box-shadow:0 4px 15px rgba(0,0,0,.08)}
.puntos{display:flex;justify-content:space-between;align-items:center}
.puntos h2{color:var(--azul);font-size:2.2em;font-weight:800}
.nivel-badge{background:var(--oro);color:#333;padding:6px 14px;border-radius:20px;font-weight:800;font-size:.8em}
.barra{height:12px;background:#e0e0e0;border-radius:10px;margin-top:12px;overflow:hidden}
.progreso{height:100%;width:0;background:linear-gradient(90deg,var(--azul),var(--verde));border-radius:10px;transition:width.8s ease}
.titulo{padding:0 20px;margin:25px 0 12px;font-size:1.3em;font-weight:700;color:var(--azul)}

.reporte-admin{
  background:white;
  margin:12px 15px;
  padding:18px;
  border-radius:16px;
  box-shadow:0 3px 10px rgba(0,0,0,.06);
  border-left:6px solid var(--naranja);
}
.reporte-admin .header-reporte{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.reporte-admin h3{color:var(--azul);font-size:1.1em;font-weight:700}
.estado-badge{padding:5px 12px;border-radius:15px;font-size:.8em;font-weight:700}
.estado-pendiente{background:#fff3cd;color:#856404}
.estado-aprobada{background:#d4edda;color:#155724}
.estado-rechazada{background:#f8d7da;color:#721c24}

.info-linea{display:flex;gap:10px;margin:6px 0;font-size:.9em}
.info-linea b{color:#444;min-width:80px}
.descripcion-box{background:#f8f9fa;padding:12px;border-radius:10px;margin:10px 0;font-size:.9em}
.foto-admin{width:100%;max-height:250px;object-fit:cover;border-radius:10px;margin:10px 0}

.btn{background:var(--verde);color:white;border:none;padding:10px 18px;border-radius:25px;font-weight:700;cursor:pointer;transition:.2s;margin-right:8px;margin-top:10px}
.btn:active{transform:scale(.95)}
.btn:disabled{background:#ccc;cursor:not-allowed}
.btn-azul{background:var(--azul)}
.btn-rojo{background:var(--rojo)}
.btn-naranja{background:var(--naranja)}

.input-form{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ccc;font-family:'Poppins';font-size:1em}
  
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:15px}
.stat-card{background:white;padding:18px;border-radius:16px;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,.06)}
.stat-card h3{font-size:1.8em;color:var(--azul);font-weight:800}
.stat-card p{font-size:.85em;color:#666;margin-top:4px}

.tabs-admin{display:flex;gap:8px;margin:15px;padding:0 15px;overflow-x:auto}
.tab-admin{padding:12px 18px;background:white;border:none;border-radius:12px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.tab-admin.active{background:var(--azul);color:white}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:12px 20px;border-radius:25px;z-index:99;opacity:0;transition:.3s}
.toast.show{opacity:1}

.empty{text-align:center;padding:40px 20px;color:#888}
.empty .icon{font-size:4em;margin-bottom:15px;opacity:.3}

.menu-bottom{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:8px 0;box-shadow:0 -3px 12px rgba(0,0,0,.1)}
.menu-item{text-align:center;font-size:.7em;color:#888;cursor:pointer;flex:1}
.menu-item.active{color:var(--azul);font-weight:700}
.menu-item span{font-size:1.8em;display:block}
</style>
</head>
<body>

<div class="header">
  <h1>3A SOMOS TODOS - ADMIN</h1>
  <p>Panel de Validación Municipal</p>
</div>

<div class="eslogan-box">
  <h2>Validemos juntos</h2>
  <p>Revisá y aprobá las misiones de los vecinos</p>
</div>

<!-- STATS -->
<div class="stats-grid">
  <div class="stat-card">
    <h3 id="statPendientes">0</h3>
    <p>Pendientes</p>
  </div>
  <div class="stat-card">
    <h3 id="statAprobadas">0</h3>
    <p>Aprobadas Hoy</p>
  </div>
  <div class="stat-card">
    <h3 id="statPuntos">0</h3>
    <p>Pts en Juego</p>
  </div>
  <div class="stat-card">
    <h3 id="statCanjes">0</h3>
    <p>Canjes Pend.</p>
  </div>
</div>

<!-- TABS -->
<div class="tabs-admin">
  <button class="tab-admin active" onclick="cambiarTab('pendientes', this)">📋 Pendientes</button>
  <button class="tab-admin" onclick="cambiarTab('historial', this)">📚 Historial</button>
  <button class="tab-admin" onclick="cambiarTab('canjes', this)">🎁 Canjes</button>
</div>

<!-- CONTENIDO PENDIENTES -->
<div id="tab-pendientes">
  <h2 class="titulo">Misiones para Validar</h2>
  <div id="listaPendientes"></div>
</div>

<!-- CONTENIDO HISTORIAL -->
<div id="tab-historial" class="hidden">
  <h2 class="titulo">Historial de Misiones</h2>
  <div id="listaHistorial"></div>
</div>

<!-- CONTENIDO CANJES -->
<div id="tab-canjes" class="hidden">
  <h2 class="titulo">Solicitudes de Canje</h2>
  <div id="listaCanjes"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let tabActual = 'pendientes';

document.addEventListener('DOMContentLoaded', function(){
  cargarTodo();
  setInterval(cargarTodo, 3000); // Revisa cada 3 seg
});

function toast(msg){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function cambiarTab(tab, btn){
  tabActual = tab;
  document.querySelectorAll('.tab-admin').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  
  document.getElementById('tab-pendientes').classList.add('hidden');
  document.getElementById('tab-historial').classList.add('hidden');
  document.getElementById('tab-canjes').classList.add('hidden');
  
  document.getElementById('tab-'+tab).classList.remove('hidden');
  cargarTodo();
}

function cargarTodo(){
  let reportes = JSON.parse(localStorage.getItem('reportes3A')) || [];
  let historial = JSON.parse(localStorage.getItem('historialMisiones3A')) || [];
  let canjes = JSON.parse(localStorage.getItem('canjes3A')) || [];
  
  // ACTUALIZAR STATS
  document.getElementById('statPendientes').innerText = reportes.length;
  document.getElementById('statAprobadas').innerText = historial.filter(h=>h.estado=='Aprobada').length;
  let puntosPend = reportes.reduce((acc,r)=>acc+r.puntos,0);
  document.getElementById('statPuntos').innerText = puntosPend;
  document.getElementById('statCanjes').innerText = canjes.length;
  
  if(tabActual=='pendientes') cargarPendientes(reportes);
  if(tabActual=='historial') cargarHistorial(historial);
  if(tabActual=='canjes') cargarCanjes(canjes);
}

function cargarPendientes(reportes){
  if(reportes.length==0){
    document.getElementById('listaPendientes').innerHTML = '<div class="empty"><div class="icon">✅</div><h3>No hay pendientes</h3><p>Todo al día</p></div>';
    return;
  }
  
  let html = '';
  reportes.forEach(rep=>{
    html += `
    <div class="reporte-admin" id="rep-${rep.id}">
      <div class="header-reporte">
        <h3>${rep.mision}</h3>
        <span class="estado-badge estado-pendiente">PENDIENTE</span>
      </div>
      
      <div class="info-linea"><b>Usuario:</b> ${rep.usuario}</div>
      <div class="info-linea"><b>Barrio:</b> ${rep.barrio}</div>
      <div class="info-linea"><b>Dirección:</b> ${rep.direccion}</div>
      <div class="info-linea"><b>Puntos:</b> <span style="color:var(--verde);font-weight:800">${rep.puntos} pts</span></div>
      <div class="info-linea"><b>Fecha:</b> ${new Date(rep.fecha).toLocaleString('es-AR')}</div>
      
      <div class="descripcion-box">
        <b>Descripción:</b><br>${rep.descripcion}
      </div>
      
      ${rep.foto ? `<img src="${rep.foto}" class="foto-admin">` : ''}
      
      <div>
        <button class="btn btn-verde" onclick="aprobarMision(${rep.id})">✅ Aprobar</button>
        <button class="btn btn-rojo" onclick="rechazarMision(${rep.id})">❌ Rechazar</button>
      </div>
    </div>
    `
  });
  document.getElementById('listaPendientes').innerHTML = html;
}

function cargarHistorial(historial){
  if(historial.length==0){
    document.getElementById('listaHistorial').innerHTML = '<div class="empty"><div class="icon">📚</div><h3>Historial Vacío</h3></div>';
    return;
  }
  
  let html = '';
  historial.reverse().forEach(rep=>{
    let claseEstado = rep.estado=='Aprobada'?'estado-aprobada':'estado-rechazada';
    let icono = rep.estado=='Aprobada'?'✅':'❌';
    html += `
    <div class="reporte-admin" style="opacity:.8;border-left-color:#ccc">
      <div class="header-reporte">
        <h3>${rep.mision}</h3>
        <span class="estado-badge ${claseEstado}">${icono} ${rep.estado}</span>
      </div>
      <div class="info-linea"><b>Usuario:</b> ${rep.usuario}</div>
      <div class="info-linea"><b>Barrio:</b> ${rep.barrio}</div>
      <div class="info-linea"><b>Puntos:</b> ${rep.puntos} pts</div>
      <div class="info-linea"><b>Fecha:</b> ${new Date(rep.fecha).toLocaleString('es-AR')}</div>
    </div>
    `
  });
  document.getElementById('listaHistorial').innerHTML = html;
}

function cargarCanjes(canjes){
  if(canjes.length==0){
    document.getElementById('listaCanjes').innerHTML = '<div class="empty"><div class="icon">🎁</div><h3>No hay canjes</h3></div>';
    return;
  }
  
  let html = '';
  canjes.forEach(c=>{
    html += `
    <div class="reporte-admin">
      <div class="header-reporte">
        <h3>🎁 ${c.beneficio}</h3>
        <span class="estado-badge estado-pendiente">${c.estado}</span>
      </div>
      <div class="info-linea"><b>Nombre:</b> ${c.nombre}</div>
      <div class="info-linea"><b>DNI:</b> ${c.dni}</div>
      <div class="info-linea"><b>Tel:</b> ${c.telefono}</div>
      <div class="info-linea"><b>Barrio:</b> ${c.barrio}</div>
      <div class="info-linea"><b>Dirección:</b> ${c.direccion||'-'}</div>
      <div class="info-linea"><b>Costo:</b> <span style="color:var(--rojo);font-weight:800">${c.costo} pts</span></div>
      
      <div>
        <button class="btn btn-verde" onclick="entregarCanje(${c.id})">📦 Entregado</button>
        <button class="btn btn-rojo" onclick="cancelarCanje(${c.id})">Cancelar</button>
      </div>
    </div>
    `
  });
  document.getElementById('listaCanjes').innerHTML = html;
}

function aprobarMision(id){
  let reportes = JSON.parse(localStorage.getItem('reportes3A')) || [];
  let historial = JSON.parse(localStorage.getItem('historialMisiones3A')) || [];
  let usuario = JSON.parse(localStorage.getItem('usuario3A')) || {};
  
  let reporte = reportes.find(r=>r.id==id);
  if(!reporte) return;
  
  // 1. Quitar de pendientes
  reportes = reportes.filter(r=>r.id!=id);
  localStorage.setItem('reportes3A', JSON.stringify(reportes));
  
  // 2. Agregar a historial
  reporte.estado = "Aprobada";
  historial.push(reporte);
  localStorage.setItem('historialMisiones3A', JSON.stringify(historial));
  
  // 3. Los puntos ya se sumaron al enviar, no sumar de nuevo
  // 4. Marcar cambio para que el index se actualice
  localStorage.setItem('ultimaAccion', Date.now());
  
  toast(`✅ Aprobada! ${reporte.usuario}`);
  cargarTodo();
}

function rechazarMision(id){
  if(!confirm('¿Rechazar esta misión?')) return;
  
  let reportes = JSON.parse(localStorage.getItem('reportes3A')) || [];
  let historial = JSON.parse(localStorage.getItem('historialMisiones3A')) || [];
  let usuario = JSON.parse(localStorage.getItem('usuario3A')) || {};
  
  let reporte = reportes.find(r=>r.id==id);
  if(!reporte) return;
  
  // 1. Quitar puntos que se habían sumado al enviar
  usuario.puntos = (usuario.puntos || 0) - reporte.puntos;
  localStorage.setItem('usuario3A', JSON.stringify(usuario));
  
  // 2. Quitar de pendientes
  reportes = reportes.filter(r=>r.id!=id);
  localStorage.setItem('reportes3A', JSON.stringify(reportes));
  
  // 3. Agregar a historial como rechazada
  reporte.estado = "Rechazada";
  historial.push(reporte);
  localStorage.setItem('historialMisiones3A', JSON.stringify(historial));
  
  // 4. Marcar cambio
  localStorage.setItem('ultimaAccion', Date.now());
  
  toast(`❌ Rechazada. -${reporte.puntos} pts`);
  cargarTodo();
}

function entregarCanje(id){
  let canjes = JSON.parse(localStorage.getItem('canjes3A')) || [];
  canjes = canjes.filter(c=>c.id!=id);
  localStorage.setItem('canjes3A', JSON.stringify(canjes));
  localStorage.setItem('ultimaAccion', Date.now());
  toast('✅ Canje entregado');
  cargarTodo();
}

function cancelarCanje(id){
  let canjes = JSON.parse(localStorage.getItem('canjes3A')) || [];
  let canje = canjes.find(c=>c.id==id);
  let usuario = JSON.parse(localStorage.getItem('usuario3A')) || {};
  
  // Devolver puntos
  usuario.puntos = (usuario.puntos || 0) + canje.costo;
  localStorage.setItem('usuario3A', JSON.stringify(usuario));
  
  canjes = canjes.filter(c=>c.id!=id);
  localStorage.setItem('canjes3A', JSON.stringify(canjes));
  localStorage.setItem('ultimaAccion', Date.now());
  
  toast(`↩️ Canje cancelado. +${canje.costo} pts`);
  cargarTodo();
}
</script>
</body>
</html>
