<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - 3A SOMOS TODOS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--azul:#0056b3;--verde:#0d8a4f;--naranja:#ff9800;--rojo:#d32f2f;--oro:#FFD700;--violeta:#8e44ad;--gris:#f0f4f8}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
  body{background:var(--gris);color:#222}
  
  .header{background:linear-gradient(135deg,var(--azul),var(--verde));color:white;padding:25px;text-align:center;box-shadow:0 3px 15px rgba(0,0,0,.2)}
  .header h1{font-size:2em;font-weight:800;letter-spacing:1px}
  .header p{font-size:1em;opacity:.9;margin-top:5px}
  
  .container{max-width:1200px;margin:0 auto;padding:20px}
  
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:30px}
  .stat-card{background:white;padding:25px;border-radius:18px;box-shadow:0 4px 15px rgba(0,0,0,.08);text-align:center;transition:.3s}
  .stat-card:hover{transform:translateY(-3px)}
  .stat-card .icon{font-size:3em;margin-bottom:10px}
  .stat-card h3{font-size:2.5em;font-weight:800;color:var(--azul)}
  .stat-card p{color:#666;font-weight:600;margin-top:5px}
  .stat-card.verde .icon{color:var(--verde)}
  .stat-card.naranja .icon{color:var(--naranja)}
  .stat-card.azul .icon{color:var(--azul)}
  .stat-card.rojo .icon{color:var(--rojo)}
  
  .tabs{display:flex;gap:10px;margin-bottom:20px;border-bottom:2px solid #ddd}
  .tab-btn{padding:15px 25px;background:none;border:none;font-size:1em;font-weight:700;color:#666;cursor:pointer;border-bottom:3px solid transparent;transition:.3s}
  .tab-btn.active{color:var(--azul);border-bottom:3px solid var(--azul)}
  
  .card{background:white;margin-bottom:20px;border-radius:18px;padding:25px;box-shadow:0 4px 15px rgba(0,0,0,.08);border-left:6px solid var(--naranja);animation:fadeIn .4s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
  .card-header h3{color:var(--azul);font-size:1.3em}
  .badge{padding:6px 14px;border-radius:20px;font-size:.85em;font-weight:700}
  .badge.pendiente{background:#fff3cd;color:#856404}
  .badge.aprobada{background:#d4edda;color:#155724}
  .badge.rechazada{background:#f8d7da;color:#721c24}
  
  .info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin:15px 0}
  .info-item{display:flex;flex-direction:column}
  .info-item label{font-size:.85em;color:#666;font-weight:600;margin-bottom:4px}
  .info-item span{font-size:1em;font-weight:600;color:#222}
  
  .descripcion-box{background:#f8f9fa;padding:15px;border-radius:10px;margin:15px 0;border-left:3px solid var(--azul)}
  .descripcion-box label{font-weight:700;color:var(--azul);display:block;margin-bottom:8px}
  
  .foto-evidencia{width:100%;max-height:400px;object-fit:contain;border-radius:12px;margin:15px 0;background:#000}
  
  .acciones{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
  .btn{padding:12px 24px;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:1em;transition:.2s;display:flex;align-items:center;gap:8px}
  .btn:hover{transform:scale(.97)}
  .btn-verde{background:var(--verde);color:white}
  .btn-rojo{background:var(--rojo);color:white}
  .btn-azul{background:var(--azul);color:white}
  .btn-gris{background:#ccc;color:#333}
  
  .empty-state{text-align:center;padding:60px 20px;color:#888}
  .empty-state .icon{font-size:5em;margin-bottom:20px;opacity:.3}
  
  .toast{position:fixed;bottom:30px;right:30px;background:#333;color:white;padding:16px 24px;border-radius:12px;z-index:999;opacity:0;transform:translateY(20px);transition:.3s;box-shadow:0 4px 15px rgba(0,0,0,.2)}
  .toast.show{opacity:1;transform:translateY(0)}
  
  .filtros{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
  .input-filtro{padding:10px 15px;border:1px solid #ccc;border-radius:10px;font-family:'Poppins'}
  
  .historial-item{opacity:.7;border-left-color:#ccc}
  
  @media(max-width:768px){
    .stats-grid{grid-template-columns:1fr}
    .acciones{flex-direction:column}
    .btn{width:100%;justify-content:center}
  }
</style>
</head>
<body>

<div class="header">
  <h1>🏛️ Panel Administrador 3A</h1>
  <p>Municipalidad de Tres Arroyos - Validación de Misiones</p>
</div>

<div class="container">
  
  <!-- ESTADISTICAS -->
  <div class="stats-grid">
    <div class="stat-card naranja">
      <div class="icon">⏳</div>
      <h3 id="statPendientes">0</h3>
      <p>Misiones Pendientes</p>
    </div>
    <div class="stat-card verde">
      <div class="icon">✅</div>
      <h3 id="statAprobadas">0</h3>
      <p>Misiones Aprobadas</p>
    </div>
    <div class="stat-card azul">
      <div class="icon">👥</div>
      <h3 id="statUsuarios">1</h3>
      <p>Usuarios Activos</p>
    </div>
    <div class="stat-card rojo">
      <div class="icon">🎯</div>
      <h3 id="statPuntos">0</h3>
      <p>Puntos en Validación</p>
    </div>
  </div>
  
  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="cambiarTab('pendientes', this)">Pendientes</button>
    <button class="tab-btn" onclick="cambiarTab('historial', this)">Historial</button>
    <button class="tab-btn" onclick="cambiarTab('canjes', this)">Canjes</button>
  </div>
  
  <!-- FILTROS -->
  <div class="filtros">
    <input type="text" id="filtroBusqueda" class="input-filtro" placeholder="Buscar por usuario o misión..." onkeyup="filtrar()">
    <select id="filtroBarrio" class="input-filtro" onchange="filtrar()">
      <option value="">Todos los barrios</option>
      <option>Barrio Unión</option>
      <option>Centro</option>
      <option>Barrio Obrero</option>
    </select>
  </div>
  
  <!-- CONTENIDO -->
  <div id="contenidoPendientes"></div>
  <div id="contenidoHistorial" style="display:none"></div>
  <div id="contenidoCanjes" style="display:none"></div>
  
</div>

<div class="toast" id="toast"></div>

<script>
let tabActual = 'pendientes';

document.addEventListener('DOMContentLoaded', function(){
  cargarTodo();
  setInterval(cargarTodo, 3000); // Auto refresh cada 3 seg
});

function toast(msg){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function cambiarTab(tab, btn){
  tabActual = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  
  document.getElementById('contenidoPendientes').style.display = tab=='pendientes'?'block':'none';
  document.getElementById('contenidoHistorial').style.display = tab=='historial'?'block':'none';
  document.getElementById('contenidoCanjes').style.display = tab=='canjes'?'block':'none';
  
  cargarTodo();
}

function cargarTodo(){
  let reportes = JSON.parse(localStorage.getItem('reportes3A')) || [];
  let historial = JSON.parse(localStorage.getItem('historialMisiones3A')) || [];
  let canjes = JSON.parse(localStorage.getItem('canjes3A')) || [];
  let usuario = JSON.parse(localStorage.getItem('usuario3A')) || {};
  
  // ACTUALIZAR STATS
  document.getElementById('statPendientes').innerText = reportes.length;
  document.getElementById('statAprobadas').innerText = historial.filter(h=>h.estado=='Aprobada').length;
  let puntosPend = reportes.reduce((acc,r)=>acc+r.puntos,0);
  document.getElementById('statPuntos').innerText = puntosPend.toLocaleString();
  
  // CARGAR PENDIENTES
  if(tabActual=='pendientes') cargarPendientes(reportes);
  if(tabActual=='historial') cargarHistorial(historial);
  if(tabActual=='canjes') cargarCanjes(canjes);
}

function cargarPendientes(reportes){
  let filtro = document.getElementById('filtroBusqueda').value.toLowerCase();
  let filtroBarrio = document.getElementById('filtroBarrio').value;
  
  let filtrados = reportes.filter(r=>{
    let matchBusqueda = r.mision.toLowerCase().includes(filtro) || r.usuario.toLowerCase().includes(filtro);
    let matchBarrio = !filtroBarrio || r.barrio == filtroBarrio;
    return matchBusqueda && matchBarrio;
  });
  
  if(filtrados.length==0){
    document.getElementById('contenidoPendientes').innerHTML = '<div class="empty-state"><div class="icon">📭</div><h3>No hay misiones pendientes</h3><p>Cuando un vecino reporte algo aparecerá aquí</p></div>';
    return;
  }
  
  let html = '';
  filtrados.forEach(rep=>{
    html += `
    <div class="card" id="card-${rep.id}">
      <div class="card-header">
        <h3>${rep.icono||'🎯'} ${rep.mision}</h3>
        <span class="badge pendiente">PENDIENTE</span>
      </div>
      
      <div class="info-grid">
        <div class="info-item"><label>Usuario</label><span>${rep.usuario}</span></div>
        <div class="info-item"><label>Barrio</label><span>${rep.barrio}</span></div>
        <div class="info-item"><label>Dirección</label><span>${rep.direccion}</span></div>
        <div class="info-item"><label>Puntos</label><span style="color:var(--verde);font-size:1.2em">${rep.puntos} pts</span></div>
        <div class="info-item"><label>Fecha</label><span>${new Date(rep.fecha).toLocaleString('es-AR')}</span></div>
      </div>
      
      <div class="descripcion-box">
        <label>Descripción del vecino:</label>
        <p>${rep.descripcion}</p>
      </div>
      
      ${rep.foto ? `<img src="${rep.foto}" class="foto-evidencia" onclick="window.open('${rep.foto}')">` : ''}
      
      <div class="acciones">
        <button class="btn btn-verde" onclick="aprobarMision(${rep.id})">✅ Aprobar Misión</button>
        <button class="btn btn-rojo" onclick="rechazarMision(${rep.id})">❌ Rechazar</button>
        <button class="btn btn-azul" onclick="verEnMapa('${rep.direccion}')">🗺️ Ver en Mapa</button>
      </div>
    </div>
    `
  });
  document.getElementById('contenidoPendientes').innerHTML = html;
}

function cargarHistorial(historial){
  if(historial.length==0){
    document.getElementById('contenidoHistorial').innerHTML = '<div class="empty-state"><div class="icon">📚</div><h3>Historial Vacío</h3></div>';
    return;
  }
  
  let html = '';
  historial.reverse().forEach(rep=>{
    let claseBadge = rep.estado=='Aprobada'?'aprobada':'rechazada';
    let icono = rep.estado=='Aprobada'?'✅':'❌';
    html += `
    <div class="card historial-item">
      <div class="card-header">
        <h3>${rep.icono||'🎯'} ${rep.mision}</h3>
        <span class="badge ${claseBadge}">${icono} ${rep.estado.toUpperCase()}</span>
      </div>
      <div class="info-grid">
        <div class="info-item"><label>Usuario</label><span>${rep.usuario}</span></div>
        <div class="info-item"><label>Barrio</label><span>${rep.barrio}</span></div>
        <div class="info-item"><label>Puntos</label><span>${rep.puntos} pts</span></div>
        <div class="info-item"><label>Fecha</label><span>${new Date(rep.fecha).toLocaleString('es-AR')}</span></div>
      </div>
    </div>
    `
  });
  document.getElementById('contenidoHistorial').innerHTML = html;
}

function cargarCanjes(canjes){
  if(canjes.length==0){
    document.getElementById('contenidoCanjes').innerHTML = '<div class="empty-state"><div class="icon">🎁</div><h3>No hay canjes solicitados</h3></div>';
    return;
  }
  
  let html = '';
  canjes.forEach(c=>{
    html += `
    <div class="card">
      <div class="card-header">
        <h3>🎁 ${c.beneficio}</h3>
        <span class="badge pendiente">${c.estado}</span>
      </div>
      <div class="info-grid">
        <div class="info-item"><label>Nombre</label><span>${c.nombre}</span></div>
        <div class="info-item"><label>DNI</label><span>${c.dni}</span></div>
        <div class="info-item"><label>Teléfono</label><span>${c.telefono}</span></div>
        <div class="info-item"><label>Barrio</label><span>${c.barrio}</span></div>
        <div class="info-item"><label>Dirección</label><span>${c.direccion||'-'}</span></div>
        <div class="info-item"><label>Costo</label><span style="color:var(--rojo)">${c.costo} pts</span></div>
      </div>
      <div class="acciones">
        <button class="btn btn-verde" onclick="entregarCanje(${c.id})">📦 Marcar como Entregado</button>
        <button class="btn btn-rojo" onclick="cancelarCanje(${c.id})">Cancelar Canje</button>
      </div>
    </div>
    `
  });
  document.getElementById('contenidoCanjes').innerHTML = html;
}

function aprobarMision(id){
  let reportes = JSON.parse(localStorage.getItem('reportes3A')) || [];
  let historial = JSON.parse(localStorage.getItem('historialMisiones3A')) || [];
  let usuario = JSON.parse(localStorage.getItem('usuario3A')) || {};
  
  let reporte = reportes.find(r=>r.id==id);
  if(!reporte) return;
  
  // Quitar de pendientes
  reportes = reportes.filter(r=>r.id!=id);
  localStorage.setItem('reportes3A', JSON.stringify(reportes));
  
  // Agregar a historial
  reporte.estado = "Aprobada";
  historial.push(reporte);
  localStorage.setItem('historialMisiones3A', JSON.stringify(historial));
  
  // Los puntos ya se sumaron al enviar, no sumar de nuevo
  localStorage.setItem('ultimaAccion', Date.now());
  
  toast(`✅ Misión aprobada! ${reporte.usuario} ya tiene ${reporte.puntos} pts`);
  cargarTodo();
}

function rechazarMision(id){
  if(!confirm('¿Seguro que querés rechazar esta misión?')) return;
  
  let reportes = JSON.parse(localStorage.getItem('reportes3A')) || [];
  let historial = JSON.parse(localStorage.getItem('historialMisiones3A')) || [];
  let usuario = JSON.parse(localStorage.getItem('usuario3A')) || {};
  
  let reporte = reportes.find(r=>r.id==id);
  if(!reporte) return;
  
  // Quitar puntos que se habían sumado
  usuario.puntos = (usuario.puntos || 0) - reporte.puntos;
  localStorage.setItem('usuario3A', JSON.stringify(usuario));
  
  // Quitar de pendientes
  reportes = reportes.filter(r=>r.id!=id);
  localStorage.setItem('reportes3A', JSON.stringify(reportes));
  
  // Agregar a historial como rechazada
  reporte.estado = "Rechazada";
  historial.push(reporte);
  localStorage.setItem('historialMisiones3A', JSON.stringify(historial));
  
  localStorage.setItem('ultimaAccion', Date.now());
  
  toast(`❌ Misión rechazada. Se quitaron ${reporte.puntos} pts`);
  cargarTodo();
}

function entregarCanje(id){
  let canjes = JSON.parse(localStorage.getItem('canjes3A')) || [];
  canjes = canjes.filter(c=>c.id!=id);
  localStorage.setItem('canjes3A', JSON.stringify(canjes));
  localStorage.setItem('ultimaAccion', Date.now());
  toast('✅ Canje marcado como entregado');
  cargarTodo();
}

function cancelarCanje(id){
  let canjes = JSON.parse(localStorage.getItem('canjes3A')) || [];
  let canje = canjes.find(c=>c.id==id);
  let usuario = JSON.parse(localStorage.getItem('usuario3A')) || {};
  
  // Devolver puntos
  usuario.puntos = (usuario.puntos || 0) + canje.costo;
  localStorage.setItem('usuario3A', JSON.stringify(usuario));
  
  canjes = canjes.filter(c=>c.id!=id);
  localStorage.setItem('canjes3A', JSON.stringify(canjes));
  localStorage.setItem('ultimaAccion', Date.now());
  
  toast(`↩️ Canje cancelado. Se devolvieron ${canje.costo} pts`);
  cargarTodo();
}

function verEnMapa(direccion){
  toast(`📍 Buscando: ${direccion}`);
  window.open(`https://www.google.com/maps/search/${encodeURIComponent(direccion + ' Tres Arroyos')}`, '_blank');
}

function filtrar(){
  cargarTodo();
}
</script>
</body>
</html>
